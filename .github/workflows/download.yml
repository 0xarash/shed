name: simple downloader

on:
  workflow_dispatch:
    inputs:
      downlaod_link:
        description: 'Download Link URL'
        required: true
        type: string
      filename:
        description: 'Filename'
        required: false
        type: string
        default: 'file'
        
jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to push to your repository
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download the file
        run: |
          wget -O "${{ inputs.filename }}" "${{ inputs.downlaod_link }}"
      
      - name: Commit and push the file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.filename }}"
          git commit -m "Add downloaded file from workflow" || echo "No changes to commit"
          git push
