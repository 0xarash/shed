name: simple downloader

on:
  workflow_dispatch:

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to push to your repository
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download the file
        run: |
          wget -O "file" "${{ vars.DOWNLOAD_URL }}"
      
      - name: Commit and push the file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add file
          git commit -m "Add downloaded file from workflow" || echo "No changes to commit"
          git push
